<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GB Gen 图像实验室</title>
  
  <link rel="icon" href="others/1024-mac.png" type="image/png">
  <link rel="apple-touch-icon" href="others/1024-mac.png">
  
  <meta name="theme-color" content="#171717">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GB Gen">
  <meta name="mobile-web-app-capable" content="yes">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { 
      background-color: #0c0c0c; 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden; 
      -webkit-touch-callout: none;
      user-select: none;
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #444; }
    
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
      object-fit: contain;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 9999px;
      flex-shrink: 0;
    }

    a { text-decoration: none; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.99); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-pop-in {
      animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const injectManifest = () => {
      const manifest = {
        name: "GB Gen 图像实验室",
        short_name: "GB Gen",
        start_url: "./", 
        display: "standalone", 
        background_color: "#171717",
        theme_color: "#171717",
        icons: [{ src: "others/1024-mac.png", sizes: "512x512", type: "image/png" }]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    };

    const registerServiceWorker = () => {
      if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });`;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
      }
    };

    const IconUpload = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
    );
    const IconDownload = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    );
    const IconCoffee = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="13" y1="1" x2="13" y2="4"/>
      </svg>
    );
    const IconClose = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    );
    const IconDice = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/>
      </svg>
    );
    const IconUndo = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );

    const PALETTES = [
      { id: 'pocket', name: '口袋灰 (Pocket Gray)', colors: ['#2b2b26', '#706b66', '#a89f94', '#e0d7c8'] },
      { id: 'classic', name: '经典绿 (Classic DMG)', colors: ['#0f380f', '#306230', '#8bac0f', '#9bbc0f'] },
      { id: 'blue', name: '冷光蓝 (Light Blue)', colors: ['#002b59', '#005f8c', '#0098ba', '#cae6ea'] },
      { id: 'vb', name: '虚拟男孩 (Virtual Boy)', colors: ['#000000', '#550000', '#aa0000', '#ff0000'] },
      { id: 'gold', name: '复古金 (Warm Gold)', colors: ['#2c1b01', '#7a4d13', '#c1913c', '#f3d87a'] },
      { id: 'cyber', name: '赛博朋克 (Cyberpunk)', colors: ['#12012e', '#005f8c', '#d9116e', '#00ffcc'] }
    ];

    const JUNE_TIPS = [
      "尽可能导入对比度比较高的照片",
      "像素颗粒和对比度是比较重要的参数",
      "个人比较喜欢口袋灰和经典绿",
      "骰子模式你玩了吗？打开之后有点版画的质感",
      "骰子模式的基础上调像素粒径？可以啊",
      "你可以导入不同比例的图片，导出不会被裁剪",
      "谢有君还有游戏和音乐项目，欢迎关注了解"
    ];

    const BAYER_8X8 = [
      [ 0, 32,  8, 40,  2, 34, 10, 42], [48, 16, 56, 24, 50, 18, 58, 26],
      [12, 44,  4, 36, 14, 46,  6, 38], [60, 28, 52, 20, 62, 30, 54, 22],
      [ 3, 35, 11, 43,  1, 33,  9, 41], [51, 19, 59, 27, 49, 17, 57, 25],
      [15, 47,  7, 39, 13, 45,  5, 37], [63, 31, 55, 23, 61, 29, 53, 21]
    ];

    const hexToRgb = (hex) => {
      const bigint = parseInt(hex.replace('#', ''), 16);
      return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
    };

    function App() {
      const [imageObj, setImageObj] = useState(null);
      const [pixelSize, setPixelSize] = useState(6); 
      const [paletteIdx, setPaletteIdx] = useState(0); 
      const [brightness, setBrightness] = useState(-21);
      const [contrast, setContrast] = useState(-16);
      const [ditherStrength, setDitherStrength] = useState(0.1);
      const [mode, setMode] = useState('GB'); 
      const [userDisplayName, setUserDisplayName] = useState("@谢有君");
      const [showDonationModal, setShowDonationModal] = useState(false);
      
      const [prevSettings, setPrevSettings] = useState(null);
      const [isRandomized, setIsRandomized] = useState(false);
      const [currentTipIdx, setCurrentTipIdx] = useState(0);

      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        injectManifest();
        registerServiceWorker();
        const tipTimer = setInterval(() => {
          setCurrentTipIdx(prev => (prev + 1) % JUNE_TIPS.length);
        }, 20000);
        return () => clearInterval(tipTimer);
      }, []);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => { setImageObj(img); };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleRandomize = () => {
        setPrevSettings({ pixelSize, paletteIdx, brightness, contrast, ditherStrength });
        setPixelSize(1);
        setDitherStrength(0);
        setPaletteIdx(Math.floor(Math.random() * PALETTES.length));
        setIsRandomized(true);
      };

      const handleUndo = () => {
        if (prevSettings) {
          setPixelSize(prevSettings.pixelSize);
          setPaletteIdx(prevSettings.paletteIdx);
          setBrightness(prevSettings.brightness);
          setContrast(prevSettings.contrast);
          setDitherStrength(prevSettings.ditherStrength);
          setIsRandomized(false);
        }
      };

      const processImage = () => {
        const canvas = canvasRef.current;
        if (!canvas || !imageObj) return;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const { width, height } = imageObj;
        canvas.width = width; canvas.height = height;
        const logicalWidth = Math.max(1, Math.floor(width / pixelSize));
        const logicalHeight = Math.max(1, Math.floor(height / pixelSize));
        const offscreen = document.createElement('canvas');
        offscreen.width = logicalWidth; offscreen.height = logicalHeight;
        const offCtx = offscreen.getContext('2d');
        offCtx.drawImage(imageObj, 0, 0, logicalWidth, logicalHeight);
        const imgData = offCtx.getImageData(0, 0, logicalWidth, logicalHeight);
        const data = imgData.data;
        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        for (let i = 0; i < data.length; i += 4) {
          let r = data[i], g = data[i+1], b = data[i+2];
          r = factor * (r - 128) + 128 + brightness;
          g = factor * (g - 128) + 128 + brightness;
          b = factor * (b - 128) + 128 + brightness;
          r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
          const x = (i / 4) % logicalWidth; const y = Math.floor((i / 4) / logicalWidth);
          const noise = ((BAYER_8X8[y % 8][x % 8] / 64) - 0.5) * 255 * ditherStrength;
          if (mode === 'GB') {
            let luma = 0.299 * r + 0.587 * g + 0.114 * b + noise;
            let idx = Math.max(0, Math.min(3, Math.floor((luma / 255) * 3 + 0.5)));
            const paletteColors = PALETTES[paletteIdx].colors.map(hexToRgb);
            data[i] = paletteColors[idx].r; data[i+1] = paletteColors[idx].g; data[i+2] = paletteColors[idx].b;
          } else {
            r += noise; g += noise; b += noise;
            data[i] = Math.max(0, Math.min(255, Math.floor(r / 8) * 8));
            data[i+1] = Math.max(0, Math.min(255, Math.floor(g / 8) * 8));
            data[i+2] = Math.max(0, Math.min(255, Math.floor(b / 8) * 8));
          }
        }
        offCtx.putImageData(imgData, 0, 0);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(offscreen, 0, 0, logicalWidth, logicalHeight, 0, 0, width, height);
      };

      useEffect(() => { processImage(); }, [imageObj, pixelSize, paletteIdx, brightness, contrast, ditherStrength, mode]);

      const download = () => {
        const link = document.createElement('a');
        link.download = `gb_gen_${mode}_${Date.now()}.png`;
        link.href = canvasRef.current.toDataURL();
        link.click();
      };

      const cardClass = "bg-zinc-900/40 rounded-2xl p-5 flex flex-col";
      const containerClass = "w-full bg-zinc-800/40 rounded-[28px] overflow-hidden";

      return (
        <div 
          className="h-[100dvh] flex flex-col items-center justify-center p-4 text-zinc-200"
          style={{
            paddingTop: 'max(1rem, env(safe-area-inset-top))',
            paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))',
            paddingLeft: 'max(1rem, env(safe-area-inset-left))',
            paddingRight: 'max(1rem, env(safe-area-inset-right))'
          }}
        >
          <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />

          {showDonationModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md" onClick={() => setShowDonationModal(false)}>
              <div className="bg-zinc-900 rounded-[32px] p-10 max-w-2xl w-full relative flex flex-col items-center animate-pop-in" onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowDonationModal(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-zinc-200 p-2 hover:bg-zinc-800 rounded-full transition-all"><IconClose size={24} /></button>
                <h2 className="text-2xl font-bold text-zinc-100 mb-2 mt-4">请我喝杯咖啡 ☕️</h2>
                <p className="text-sm text-zinc-500 mb-10">如果这个工具对你有帮助，欢迎打赏支持独立开发</p>
                <div className="flex gap-8 w-full justify-center">
                  <div className="flex flex-col items-center bg-zinc-950 p-5 rounded-3xl w-[240px]">
                    <div className="w-full aspect-square bg-white rounded-2xl overflow-hidden mb-4"><img src="others/wechatpay.jpg" alt="微信支付" className="w-full h-full object-cover" /></div>
                    <span className="text-sm font-bold text-[#07c160] tracking-widest">微信支付</span>
                  </div>
                  <div className="flex flex-col items-center bg-zinc-950 p-5 rounded-3xl w-[240px]">
                    <div className="w-full aspect-square bg-white rounded-2xl overflow-hidden mb-4"><img src="others/alipay.jpg" alt="支付宝" className="w-full h-full object-cover" /></div>
                    <span className="text-sm font-bold text-[#1677ff] tracking-widest">支付宝</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 窗口缩放核心逻辑：w-[75vw] 确保占据画面的 70% 左右，整体居中 */}
          <div className="w-[75vw] max-w-5xl flex flex-col gap-5 animate-pop-in">
            {/* 顶栏 */}
            <div className={`${containerClass} p-4 flex items-center justify-between gap-6 flex-shrink-0`}>
              <div className="flex items-center gap-5 text-left">
                <img src="others/xieyoujune.jpg" alt="Avatar" className="user-avatar" onError={(e) => e.target.style.display='none'} />
                <div className="flex flex-col text-left">
                  <span className="text-xl font-black text-zinc-100 leading-none tracking-tight transition-all duration-200">{userDisplayName}</span>
                  <div className="flex items-center gap-2 mt-1.5 text-[10px] font-bold uppercase tracking-widest">
                    <a href="https://music.163.com/#/artist?id=1184020" target="_blank" rel="noopener noreferrer" className="text-zinc-500 hover:text-green-400 transition-colors" onMouseEnter={() => setUserDisplayName("看看我的音乐项目")} onMouseLeave={() => setUserDisplayName("@谢有君")}>独立音乐人</a>
                    <span className="text-zinc-800">/</span>
                    <a href="https://www.xiaohongshu.com/user/profile/63cac1130000000026006f9a" target="_blank" rel="noopener noreferrer" className="text-zinc-500 hover:text-green-400 transition-colors" onMouseEnter={() => setUserDisplayName("看看我的游戏项目")} onMouseLeave={() => setUserDisplayName("@谢有君")}>《人生之旅》游戏开发者</a>
                  </div>
                </div>
                <div className="h-10 w-[1px] bg-white/10 mx-2"></div>
                <div className="flex flex-col text-left">
                  <h1 className="text-xl font-black text-green-400 leading-none tracking-tight">GB Gen 图像实验室</h1>
                  <p className="text-[10px] font-bold text-zinc-600 mt-1.5 uppercase tracking-widest">Pixel Art Generation Lab</p>
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => fileInputRef.current?.click()} className="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 rounded-xl flex items-center gap-2 transition-all text-sm font-black uppercase tracking-widest"><IconUpload size={16} />上传</button>
                <button onClick={download} disabled={!imageObj} className="px-5 py-2.5 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-xl flex items-center gap-2 transition-all disabled:opacity-20 text-sm font-black uppercase tracking-widest"><IconDownload size={16} />导出</button>
                <button onClick={() => setShowDonationModal(true)} className="px-4 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 rounded-xl flex items-center transition-all"><IconCoffee size={18} /></button>
              </div>
            </div>

            {/* 工作区：压缩最大高度，维持紧凑比例 */}
            <div className="flex gap-5 items-stretch justify-center h-full min-h-[480px] lg:max-h-[540px] xl:max-h-[580px]">
              
              {/* 控制台：缩小尺寸 */}
              {imageObj && (
                <div className={`w-[320px] xl:w-[350px] flex-shrink-0 ${containerClass} p-4 flex flex-col justify-between overflow-hidden animate-pop-in`}>
                  
                  {/* 卡片1：模式选择 */}
                  <div className={`${cardClass} p-4`}>
                    <div className="flex gap-2.5 items-center">
                      <div className="flex-1 flex p-1 bg-black/30 rounded-xl">
                          <button onClick={() => setMode('GB')} className={`flex-1 py-2 text-[11px] font-black uppercase tracking-widest rounded-lg transition-all ${mode === 'GB' ? 'bg-zinc-700 text-green-400 shadow-xl' : 'text-zinc-600 hover:text-zinc-300'}`}>GB Mode</button>
                          <button onClick={() => setMode('GBC')} className={`flex-1 py-2 text-[11px] font-black uppercase tracking-widest rounded-lg transition-all ${mode === 'GBC' ? 'bg-zinc-700 text-green-400 shadow-xl' : 'text-zinc-600 hover:text-zinc-300'}`}>GBC Mode</button>
                      </div>
                      <button onClick={isRandomized ? handleUndo : handleRandomize} className="p-2.5 bg-black/30 hover:bg-zinc-800 rounded-xl transition-all text-zinc-500 hover:text-green-400">
                        {isRandomized ? <IconUndo size={18} /> : <IconDice size={18} />}
                      </button>
                    </div>
                  </div>

                  {/* 卡片2：参数控制 */}
                  <div className={`${cardClass} p-4`}>
                    <div className="flex flex-col gap-4 text-left">
                      <div className="flex flex-col gap-2">
                        <div className="flex justify-between text-[11px] font-black text-green-400 uppercase tracking-widest"><span>像素粒径 / Pixel Size</span><span>{pixelSize}PX</span></div>
                        <input type="range" min="1" max="40" value={pixelSize} onChange={e => setPixelSize(Number(e.target.value))} className="w-full accent-green-500 h-1.5" />
                      </div>
                      <div className="flex flex-col gap-3 mt-1">
                        {[
                          { label: '亮度 / Brightness', val: brightness, set: setBrightness, min: -100, max: 100 },
                          { label: '对比度 / Contrast', val: contrast, set: setContrast, min: -100, max: 100 },
                          { label: '抖动 / Dither', val: ditherStrength, set: setDitherStrength, min: 0, max: 2, step: 0.1 }
                        ].map(item => (
                          <div key={item.label} className="flex flex-col gap-1.5 text-left">
                            <div className="flex justify-between text-[10px] font-black text-zinc-500 uppercase tracking-widest text-left"><span>{item.label}</span><span>{item.val}</span></div>
                            <input type="range" min={item.min} max={item.max} step={item.step || 1} value={item.val} onChange={e => item.set(Number(e.target.value))} className="w-full accent-green-500 h-1" />
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* 卡片3：调色板 */}
                  <div className={`${cardClass} p-4 transition-opacity duration-500 ${mode === 'GBC' ? 'opacity-20 pointer-events-none grayscale' : 'opacity-100'}`}>
                    <div className="text-[11px] font-black text-zinc-400 uppercase tracking-widest mb-3 text-left">调色板 / Palettes</div>
                    <div className="grid grid-cols-2 gap-2 text-left">
                      {PALETTES.map((p, i) => (
                        <button key={i} onClick={() => setPaletteIdx(i)} className={`group flex flex-col gap-2 px-3 py-2 rounded-xl transition-all ${paletteIdx === i ? 'bg-zinc-800 ring-1 ring-green-500 text-green-400' : 'bg-black/30 hover:bg-zinc-800 text-zinc-500'}`}>
                          <span className="text-[9px] font-black uppercase tracking-tighter truncate text-left">{p.name.split(' (')[0]}</span>
                          <div className="flex h-1 w-full rounded-full overflow-hidden shadow-inner">
                            {p.colors.map(c => <div key={c} style={{backgroundColor: c}} className="flex-1" />)}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* 卡片4：小提示 */}
                  <div className={`${cardClass} p-4`}>
                    <div className="text-[11px] font-black text-zinc-400 uppercase tracking-widest mb-1 text-left">有君建议 / June's Tips</div>
                    <div className="h-[20px] relative overflow-hidden text-left">
                      {JUNE_TIPS.map((tip, index) => (
                        <div key={index} className={`absolute left-0 right-0 top-0 text-[10px] font-bold text-zinc-600 leading-tight transition-all duration-1000 ${currentTipIdx === index ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-1 pointer-events-none'}`}>
                          {tip}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* 预览显示区：纯黑底色，维持绝对居中 */}
              <div 
                className={`flex-1 ${containerClass} bg-[#000000] flex flex-col items-center justify-center relative p-8`} 
                onDoubleClick={() => !imageObj && fileInputRef.current?.click()}
              >
                <div className="absolute top-6 left-6 flex items-center gap-3 z-10 text-left">
                    <div className={`w-2.5 h-2.5 rounded-full ${imageObj ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.6)] animate-pulse' : 'bg-zinc-900'}`}></div>
                    <div className="text-[11px] text-zinc-600 font-black uppercase tracking-[0.2em] leading-none text-left">显示输出 / Live Output</div>
                </div>
                
                {imageObj && (
                  <div className="w-full h-full flex flex-col items-center justify-center animate-pop-in">
                    <div className="flex-1 flex items-center justify-center w-full min-h-0 mt-6">
                      <canvas ref={canvasRef} className="max-w-full max-h-full rounded-sm shadow-[0_30px_80px_rgba(0,0,0,0.9)]" />
                    </div>
                    <div className="mt-8 mb-2 flex flex-col items-center gap-2 text-center flex-shrink-0">
                        <p className="text-[12px] text-zinc-400 font-black uppercase tracking-[0.2em]">
                          {isRandomized ? 'Dice Mode (Experimental)' : (mode === 'GB' ? 'Original Game Boy Mode (DMG-01)' : 'Game Boy Color Mode (CGB-001)')}
                        </p>
                        <p className="text-[9px] text-zinc-700 font-bold uppercase tracking-[0.3em]">
                          {imageObj.width} X {imageObj.height} {isRandomized ? 'STOCHASTIC RENDER' : 'DOT MATRIX DISPLAY'}
                        </p>
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* 页脚：保持在一屏内 */}
            <footer className="py-2 text-center opacity-30 hover:opacity-100 transition-opacity">
               <p className="text-[9px] text-zinc-500 font-bold tracking-widest uppercase">
                 感谢 olivvybee，愿天下开源作者一生平安快乐。原作者主页：<a href="https://ko-fi.com/olivvybee" target="_blank" className="underline hover:text-green-400">https://ko-fi.com/olivvybee</a>
               </p>
            </footer>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
