<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GB Gen 图像与视频实验室</title>
  
  <link rel="icon" href="others/icon.png">
  <link rel="apple-touch-icon" href="others/icon.png">
  
  <meta name="theme-color" content="#0c0c0c">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GB Gen">
  <meta name="mobile-web-app-capable" content="yes">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { 
      background-color: #0c0c0c; 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden; 
      -webkit-touch-callout: none;
      user-select: none;
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 50%;
      flex-shrink: 0;
    }

    a { text-decoration: none; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.99); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-pop-in {
      animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .custom-slider {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 9999px;
      outline: none;
      border: none;
      margin: 0; 
    }

    .custom-slider::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: transparent;
      border: none;
      border-radius: 9999px;
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px; 
      height: 14px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
      box-shadow: none;
      margin-top: -5px; 
    }

    .custom-slider::-moz-range-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: transparent;
      border: none;
      border-radius: 9999px;
    }

    .custom-slider::-moz-range-thumb {
      width: 14px; 
      height: 14px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
      box-shadow: none;
    }

    @keyframes fastBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 15px rgba(239, 68, 68, 1); }
      50% { opacity: 0.3; box-shadow: 0 0 2px rgba(239, 68, 68, 0.5); }
    }
    .animate-fast-blink {
      animation: fastBlink 0.3s ease-in-out infinite;
    }

    @keyframes coffee-pulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn-coffee-lab {
      position: relative;
      overflow: hidden;
      z-index: 1;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-coffee-lab::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(-45deg, #1677ff, #07c160, #1677ff, #07c160);
      background-size: 400% 400%;
      opacity: 0;
      z-index: -1;
      transition: opacity 0.6s ease;
    }

    .btn-coffee-lab:hover::before {
      opacity: 1;
      animation: coffee-pulse 8s ease infinite;
    }

    .btn-coffee-lab:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(22, 119, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const registerServiceWorker = () => {
      if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });`;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
      }
    };

    const Icons = {
      Upload: ({ size = 20 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
      ),
      Download: ({ size = 20 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      ),
      Coffee: ({ size = 18 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="13" y1="1" x2="13" y2="4"/></svg>
      ),
      Close: ({ size = 24 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      ),
      Dice: ({ size = 18 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
      ),
      Undo: ({ size = 18 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      ),
      Flask: ({ size = 18 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a2 2 0 0 0 1.8 2.95h10.96a2 2 0 0 0 1.8-2.95L14.2 10.42a2 2 0 0 1-.2-1.316V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></svg>
      )
    };

    const PALETTES = [
      { id: 'pocket', name: '口袋灰 (Pocket Gray)', colors: ['#2b2b26', '#706b66', '#a89f94', '#e0d7c8'] },
      { id: 'classic', name: '经典绿 (Classic DMG)', colors: ['#0f380f', '#306230', '#8bac0f', '#9bbc0f'] },
      { id: 'blue', name: '冷光蓝 (Light Blue)', colors: ['#002b59', '#005f8c', '#0098ba', '#cae6ea'] },
      { id: 'vb', name: '虚拟男孩 (Virtual Boy)', colors: ['#000000', '#550000', '#aa0000', '#ff0000'] },
      { id: 'gold', name: '复古金 (Warm Gold)', colors: ['#2c1b01', '#7a4d13', '#c1913c', '#f3d87a'] },
      { id: 'cyber', name: '赛博朋克 (Cyberpunk)', colors: ['#12012e', '#005f8c', '#d9116e', '#00ffcc'] }
    ];

    const hexToRgb = (hex) => {
      const bigint = parseInt(hex.replace('#', ''), 16);
      return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
    };

    const BAYER_8X8 = [
      [ 0, 32,  8, 40,  2, 34, 10, 42], [48, 16, 56, 24, 50, 18, 58, 26],
      [12, 44,  4, 36, 14, 46,  6, 38], [60, 28, 52, 20, 62, 30, 54, 22],
      [ 3, 35, 11, 43,  1, 33,  9, 41], [51, 19, 59, 27, 49, 17, 57, 25],
      [15, 47,  7, 39, 13, 45,  5, 37], [63, 31, 55, 23, 61, 29, 53, 21]
    ];

    function App() {
      const [mediaObj, setMediaObj] = useState(null);
      const [mediaType, setMediaType] = useState(''); 
      const [pixelSize, setPixelSize] = useState(6); 
      const [paletteIdx, setPaletteIdx] = useState(0); 
      const [brightness, setBrightness] = useState(-21);
      const [contrast, setContrast] = useState(-16);
      const [ditherStrength, setDitherStrength] = useState(0.1);
      const [hue, setHue] = useState(0); 
      const [saturation, setSaturation] = useState(1);
      const [mode, setMode] = useState('GB'); 
      const [showDonationModal, setShowDonationModal] = useState(false);
      const [prevSettings, setPrevSettings] = useState(null);
      const [isRandomized, setIsRandomized] = useState(false);
      const [isLabMode, setIsLabMode] = useState(false);
      const [isRecording, setIsRecording] = useState(false);

      // V8.0 规范要求 Hooks
      const [showUIMenu, setShowUIMenu] = useState(false);
      const avatarClickCount = useRef(0);
      const avatarClickTimer = useRef(null);
      const uiRuleInputRef = useRef(null);

      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);
      const processedCanvasRef = useRef(null);
      const animationRef = useRef(null);
      const recorderRef = useRef(null);
      
      const mediaObjRef = useRef(mediaObj);
      const mediaTypeRef = useRef(mediaType);
      const pixelSizeRef = useRef(pixelSize);
      const paletteIdxRef = useRef(paletteIdx);
      const brightnessRef = useRef(brightness);
      const contrastRef = useRef(contrast);              
      const dynamicContrastRef = useRef(contrast);       
      const ditherStrengthRef = useRef(ditherStrength);
      const hueRef = useRef(hue);
      const saturationRef = useRef(saturation);
      const modeRef = useRef(mode);
      const isLabModeRef = useRef(isLabMode);
      const isDraggingRef = useRef(false);

      useEffect(() => { mediaObjRef.current = mediaObj; }, [mediaObj]);
      useEffect(() => { mediaTypeRef.current = mediaType; }, [mediaType]);
      useEffect(() => { pixelSizeRef.current = pixelSize; }, [pixelSize]);
      useEffect(() => { paletteIdxRef.current = paletteIdx; }, [paletteIdx]);
      useEffect(() => { brightnessRef.current = brightness; }, [brightness]);
      useEffect(() => { ditherStrengthRef.current = ditherStrength; }, [ditherStrength]);
      useEffect(() => { hueRef.current = hue; }, [hue]);
      useEffect(() => { saturationRef.current = saturation; }, [saturation]);
      useEffect(() => { modeRef.current = mode; }, [mode]);
      useEffect(() => { isLabModeRef.current = isLabMode; }, [isLabMode]);
      
      useEffect(() => { 
          contrastRef.current = contrast; 
          if (!isLabModeRef.current) dynamicContrastRef.current = contrast;
      }, [contrast]);

      useEffect(() => { registerServiceWorker(); }, []);

      const handleAvatarClick = () => {
        avatarClickCount.current += 1;
        if (avatarClickCount.current === 3) {
          setShowUIMenu(prev => !prev);
          avatarClickCount.current = 0;
          clearTimeout(avatarClickTimer.current);
        } else {
          clearTimeout(avatarClickTimer.current);
          avatarClickTimer.current = setTimeout(() => { avatarClickCount.current = 0; }, 600);
        }
      };

      const handleUploadUIRules = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try { JSON.parse(evt.target.result); setShowUIMenu(false); } catch (err) { console.error("Invalid JSON"); }
        };
        reader.readAsText(file);
      };

      const handleDownloadUIRules = () => {
        const blob = new Blob([JSON.stringify({name: "GBG-UI-Rules", version: "8.0"}, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'ui-rules.json'; a.click();
        setShowUIMenu(false);
      };

      const handleMediaUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (mediaType === 'video' && mediaObj) {
            mediaObj.pause();
            mediaObj.removeAttribute('src');
            mediaObj.load();
        }
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => { setMediaObj(img); setMediaType('image'); };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        } else if (file.type.startsWith('video/')) {
            const video = document.createElement('video');
            video.src = URL.createObjectURL(file);
            video.loop = true; video.muted = true; video.playsInline = true;
            video.onloadeddata = () => { video.play(); setMediaObj(video); setMediaType('video'); };
        }
      };

      const handleRandomize = () => {
        setPrevSettings({ pixelSize, paletteIdx, brightness, contrast, ditherStrength, hue, saturation });
        setPixelSize(1); setDitherStrength(0);
        setPaletteIdx(Math.floor(Math.random() * PALETTES.length));
        setHue(Math.floor(Math.random() * 360)); setSaturation(Math.random() * 2);
        setIsRandomized(true);
      };

      const handleUndo = () => {
        if (prevSettings) {
          setPixelSize(prevSettings.pixelSize); setPaletteIdx(prevSettings.paletteIdx);
          setBrightness(prevSettings.brightness); setContrast(prevSettings.contrast);
          setDitherStrength(prevSettings.ditherStrength); setHue(prevSettings.hue || 0);
          setSaturation(prevSettings.saturation !== undefined ? prevSettings.saturation : 1);
          setIsRandomized(false);
        }
      };

      const processMedia = () => {
        const media = mediaObjRef.current;
        const canvas = canvasRef.current;
        if (!canvas || !media) return false;
        const isVideo = mediaTypeRef.current === 'video';
        const width = isVideo ? media.videoWidth : media.width;
        const height = isVideo ? media.videoHeight : media.height;
        if (width === 0 || height === 0) return false;
        if (!processedCanvasRef.current) processedCanvasRef.current = document.createElement('canvas');
        const pCanvas = processedCanvasRef.current;
        
        canvas.width = width; canvas.height = height;
        pCanvas.width = width; pCanvas.height = height;
        
        const pSize = pixelSizeRef.current;
        const activeContrast = dynamicContrastRef.current; 
        const bBright = brightnessRef.current;
        const dStr = ditherStrengthRef.current;
        const hVal = hueRef.current;
        const sVal = saturationRef.current;
        const pIdx = paletteIdxRef.current;
        const curMode = modeRef.current;

        const logicalWidth = Math.max(1, Math.floor(width / pSize));
        const logicalHeight = Math.max(1, Math.floor(height / pSize));
        
        const offscreen = document.createElement('canvas');
        offscreen.width = logicalWidth; offscreen.height = logicalHeight;
        const offCtx = offscreen.getContext('2d');
        offCtx.drawImage(media, 0, 0, logicalWidth, logicalHeight);
        
        const imgData = offCtx.getImageData(0, 0, logicalWidth, logicalHeight);
        const data = imgData.data;
        const factor = (259 * (activeContrast + 255)) / (255 * (259 - activeContrast));
        
        const angle = hVal * Math.PI / 180;
        const cosA = Math.cos(angle); const sinA = Math.sin(angle);
        const m = [
            0.213+cosA*0.787-sinA*0.213, 0.715-cosA*0.715-sinA*0.715, 0.072-cosA*0.072+sinA*0.928,
            0.213-cosA*0.213+sinA*0.143, 0.715+cosA*0.285+sinA*0.140, 0.072-cosA*0.072-sinA*0.283,
            0.213-cosA*0.213-sinA*0.787, 0.715-cosA*0.715+sinA*0.715, 0.072+cosA*0.928+sinA*0.072
        ];

        for (let i = 0; i < data.length; i += 4) {
          let r = data[i], g = data[i+1], b = data[i+2];
          let rx = r*m[0]+g*m[1]+b*m[2]; let gx = r*m[3]+g*m[4]+b*m[5]; let bx = r*m[6]+g*m[7]+b*m[8];
          const gray = 0.299*rx + 0.587*gx + 0.114*bx;
          r = gray+(rx-gray)*sVal; g = gray+(gx-gray)*sVal; b = gray+(bx-gray)*sVal;
          r = factor*(r-128)+128+bBright; g = factor*(g-128)+128+bBright; b = factor*(b-128)+128+bBright;
          r = Math.max(0,Math.min(255,r)); g = Math.max(0,Math.min(255,g)); b = Math.max(0,Math.min(255,b));
          
          const x = (i/4)%logicalWidth; const y = Math.floor((i/4)/logicalWidth);
          const noise = ((BAYER_8X8[y%8][x%8]/64)-0.5)*255*dStr;
          
          if (curMode === 'GB') {
            let luma = 0.299*r + 0.587*g + 0.114*b+noise;
            let idx = Math.max(0, Math.min(3, Math.floor((luma/255)*3 + 0.5)));
            const paletteColors = PALETTES[pIdx].colors.map(hexToRgb);
            data[i] = paletteColors[idx].r; data[i+1] = paletteColors[idx].g; data[i+2] = paletteColors[idx].b;
          } else {
            r += noise; g += noise; b += noise;
            data[i] = Math.max(0, Math.min(255, Math.floor(r/8)*8));
            data[i+1] = Math.max(0, Math.min(255, Math.floor(g/8)*8));
            data[i+2] = Math.max(0, Math.min(255, Math.floor(b/8)*8));
          }
        }
        offCtx.putImageData(imgData, 0, 0);
        
        const pCtx = pCanvas.getContext('2d', { willReadFrequently: true });
        pCtx.imageSmoothingEnabled = false; 
        pCtx.clearRect(0, 0, width, height);
        pCtx.drawImage(offscreen, 0, 0, logicalWidth, logicalHeight, 0, 0, width, height);
        
        if (!isLabModeRef.current) {
            const ctx = canvas.getContext('2d'); 
            ctx.clearRect(0, 0, width, height); 
            ctx.drawImage(pCanvas, 0, 0);
        }
        return true;
      };

      const applySpatialGlitch = () => {
          const canvas = canvasRef.current; const pCanvas = processedCanvasRef.current;
          if (!canvas || !pCanvas) return;
          const ctx = canvas.getContext('2d'); const w = canvas.width; const h = canvas.height;
          const currentPixelSize = pixelSizeRef.current;
          ctx.drawImage(pCanvas, 0, 0);
          if (Math.random() < 0.3) {
              let drawYOffset = 0;
              if (Math.random() < 0.2) { 
                  drawYOffset = Math.floor((Math.random()-0.5)*10)*currentPixelSize;
                  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h); ctx.drawImage(pCanvas, 0, drawYOffset);
              }
              if (Math.random() < 0.5) { 
                  const numSlices = Math.floor(Math.random()*4)+1;
                  for(let i=0; i<numSlices; i++) {
                      const sliceY = Math.floor((Math.random()*h)/currentPixelSize)*currentPixelSize;
                      const sliceH = Math.floor((Math.random()*(h*0.1))/currentPixelSize)*currentPixelSize+currentPixelSize;
                      const shiftX = Math.floor((Math.random()-0.5)*15)*currentPixelSize; 
                      ctx.drawImage(pCanvas, 0, sliceY, w, sliceH, shiftX, sliceY+drawYOffset, w, sliceH);
                  }
              }
          }
      };

      useEffect(() => { if (mediaType === 'image' && !isLabMode) processMedia(); }, [mediaObj, pixelSize, paletteIdx, brightness, contrast, ditherStrength, hue, saturation, mode, isLabMode, mediaType]);

      useEffect(() => {
        if (!mediaObj) return;
        const loop = () => {
            const isVideo = mediaTypeRef.current === 'video';
            const isLab = isLabModeRef.current;
            if (!isVideo && !isLab) return;
            if (isVideo || isLab) processMedia(); 
            if (isLab) applySpatialGlitch();
            animationRef.current = requestAnimationFrame(loop);
        };
        loop();
        return () => cancelAnimationFrame(animationRef.current);
      }, [isLabMode, mediaObj, mediaType]);

      const download = () => {
        const canvas = canvasRef.current; if (!canvas) return;
        if (isRecording && recorderRef.current) { recorderRef.current.stop(); return; }
        
        if (isLabMode || mediaType === 'video') {
          setIsRecording(true);
          const stream = canvas.captureStream(30); 
          const options = {
            mimeType: 'video/mp4; codecs=avc1',
            videoBitsPerSecond: 100000000 
          };
          let recorder;
          try { recorder = new MediaRecorder(stream, options); } catch(e) { recorder = new MediaRecorder(stream, { videoBitsPerSecond: 100000000 }); }
          recorderRef.current = recorder; 
          const chunks = [];
          recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
          recorder.onstop = () => {
            const extension = recorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
            const blob = new Blob(chunks, { type: recorder.mimeType }); 
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a'); 
            link.download = `gbg_${mediaType}_${Date.now()}.${extension}`;
            link.href = url; link.click(); setIsRecording(false);
          };
          recorder.start();
          // 默认录制时长固定为 10 秒
          setTimeout(() => { if (recorder.current && recorder.current.state === "recording") recorder.current.stop(); }, 10000);
        } else {
          const link = document.createElement('a'); 
          link.download = `gbg_${Date.now()}.png`;
          link.href = canvas.toDataURL('image/png'); 
          link.click();
        }
      };

      const cardClass = "bg-zinc-900/40 rounded-[24px] p-5 flex flex-col gap-4";
      const containerClass = "bg-zinc-800/40 rounded-[28px] overflow-hidden";

      const Slider = ({ label, value, min, max, onChange, suffix = '' }) => (
        <div className="flex flex-col gap-1.5">
          <div className="flex justify-between text-[11px] font-black text-zinc-500 uppercase tracking-widest text-left">
            <span>{label}</span>
            <span className="text-zinc-100 font-mono">{value}{suffix}</span>
          </div>
          <input 
            type="range" min={min} max={max} step={suffix==='PX'?1:0.1}
            value={value} onChange={e=>onChange(Number(e.target.value))} 
            className="custom-slider w-full" 
            style={{ background: `linear-gradient(to right, #4ade80 ${((value-min)/(max-min || 1))*100}%, #333 ${((value-min)/(max-min || 1))*100}%)` }} 
          />
        </div>
      );

      return (
        <div className="h-[100dvh] flex flex-col items-center justify-center p-4 text-zinc-200">
          <input type="file" ref={uiRuleInputRef} onChange={handleUploadUIRules} accept=".json" className="hidden" />
          <input type="file" ref={fileInputRef} onChange={handleMediaUpload} accept="image/*,video/*" className="hidden" />

          {showDonationModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md" onClick={() => setShowDonationModal(false)}>
              <div className="bg-zinc-900 rounded-[28px] p-10 max-w-2xl w-full relative flex flex-col items-center animate-pop-in" onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowDonationModal(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-zinc-200 p-2 rounded-full"><Icons.Close size={24} /></button>
                <h2 className="text-2xl font-black text-zinc-100 mb-2 mt-4 tracking-tight text-center">请我喝杯咖啡 ☕️</h2>
                <p className="text-sm font-bold text-zinc-500 mb-10 tracking-widest uppercase text-center">感谢支持独立开发</p>
                <div className="flex gap-8 w-full justify-center text-center">
                  {['wechatpay', 'alipay'].map(p => (
                    <div key={p} className="flex flex-col items-center bg-zinc-950 p-6 rounded-[24px] w-[240px]">
                      <div className="w-full aspect-square bg-white rounded-[20px] overflow-hidden mb-4 flex items-center justify-center"><img src={`others/${p}.jpg`} className="w-full h-full object-cover" /></div>
                      <span className={`text-sm font-black tracking-widest uppercase ${p==='alipay'?'text-[#1677ff]':'text-[#07c160]'}`}>{p==='alipay'?'支付宝':'微信支付'}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          <div className="w-full max-w-[1400px] mx-auto flex flex-col gap-4 animate-pop-in h-full">
            {/* 顶栏 Header */}
            <header className={`${containerClass} rounded-full py-3 px-6 flex items-center justify-between gap-6 shrink-0`}>
              <div className="relative flex items-center gap-5 text-left">
                <img onClick={handleAvatarClick} src="others/xieyoujune.jpg" className="user-avatar cursor-pointer hover:scale-105 transition-transform" />
                {showUIMenu && (
                  <>
                    <div className="fixed inset-0 z-40" onClick={() => setShowUIMenu(false)}></div>
                    <div className="absolute top-[52px] left-0 z-50 bg-zinc-800 rounded-[20px] p-4 w-[240px] flex flex-col gap-2">
                      <h3 className="text-[11px] font-black text-white mb-2 uppercase tracking-widest leading-tight">UI Rules Sync</h3>
                      <button onClick={() => uiRuleInputRef.current?.click()} className="bg-zinc-700/50 hover:bg-zinc-700 text-zinc-200 py-2.5 px-4 rounded-[12px] font-black text-[11px] uppercase tracking-widest text-left">上传规则</button>
                      <button onClick={handleDownloadUIRules} className="bg-zinc-700/50 hover:bg-zinc-700 text-zinc-200 py-2.5 px-4 rounded-[12px] font-black text-[11px] uppercase tracking-widest text-left">导出规则</button>
                    </div>
                  </>
                )}
                <div className="flex flex-col text-left">
                  <span className="text-xl font-black text-zinc-100 leading-none tracking-tight">@谢有君</span>
                  <div className="flex items-center gap-2 mt-1.5 text-[10px] font-bold uppercase tracking-widest text-zinc-500 leading-none">
                    <a href="https://music.163.com/#/artist?id=1184020" target="_blank" className="hover:text-green-400 transition-colors">独立音乐人</a>
                    <span className="text-zinc-800">/</span>
                    <a href="https://www.xiaohongshu.com/user/profile/63cac1130000000026006f9a" target="_blank" className="hover:text-green-400 transition-colors">游戏开发者</a>
                  </div>
                </div>
                <div className="w-px h-8 bg-white/10 mx-2"></div>
                <div className="flex flex-col text-left">
                  <h1 className="text-xl font-black text-green-400 leading-none tracking-tight uppercase">GB Gen 图像实验室</h1>
                  <p className="text-[10px] font-bold text-zinc-600 mt-1.5 uppercase tracking-widest leading-none">Pixel Art Generation Lab</p>
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => fileInputRef.current?.click()} className="px-7 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 rounded-full text-[11px] font-black uppercase tracking-widest flex items-center gap-2 transition-all">上传</button>
                <button onClick={download} disabled={!mediaObj} className="px-7 py-2.5 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-full text-[11px] font-black uppercase tracking-widest min-w-[120px] flex items-center justify-center gap-2 active:scale-95 transition-all">
                  {isRecording ? <span className="animate-pulse">停止录制</span> : <><Icons.Download size={16} />导出</>}
                </button>
                <button onClick={() => setShowDonationModal(true)} className="px-4 py-2.5 bg-zinc-800 text-zinc-100 rounded-full btn-coffee-lab transition-all"><Icons.Coffee /></button>
              </div>
            </header>

            <div className="flex gap-4 items-stretch justify-center flex-1 min-h-0">
              {/* 左侧控制栏 */}
              <aside className={`w-[320px] shrink-0 ${containerClass} p-4 flex flex-col gap-4 overflow-hidden animate-pop-in`}>
                <div className={`${cardClass} bg-zinc-800/20 p-4`}>
                  <div className="flex gap-1.5 p-1 bg-black/30 rounded-[18px]">
                    <button onClick={() => setMode('GB')} className={`flex-1 py-2 text-[11px] font-black uppercase tracking-widest rounded-[12px] transition-all ${mode==='GB'?'bg-zinc-700 text-green-400 shadow-sm':'text-zinc-600 hover:text-zinc-400'}`}>GB</button>
                    <button onClick={() => setMode('GBC')} className={`flex-1 py-2 text-[11px] font-black uppercase tracking-widest rounded-[12px] transition-all ${mode==='GBC'?'bg-zinc-700 text-green-400 shadow-sm':'text-zinc-600 hover:text-zinc-400'}`}>GBC</button>
                    <button onClick={() => setIsLabMode(!isLabMode)} className={`p-1.5 px-3 rounded-[12px] transition-all ${isLabMode?'bg-green-500/20 text-green-400 shadow-sm':'text-zinc-600 hover:text-zinc-400'}`} title="Lab Mode"><Icons.Flask /></button>
                    <button onClick={isRandomized ? handleUndo : handleRandomize} className="p-1.5 px-3 rounded-[12px] text-zinc-600 hover:text-green-400 transition-all">{isRandomized ? <Icons.Undo /> : <Icons.Dice />}</button>
                  </div>
                </div>

                <div className={`${cardClass} flex-1 p-5`}>
                  <div className="flex flex-col gap-5">
                    <Slider label="像素粒径 / Pixel Size" value={pixelSize} min={1} max={40} onChange={setPixelSize} suffix="PX" />
                    <Slider label="亮度 / Brightness" value={brightness} min={-100} max={100} onChange={setBrightness} />
                    <Slider label="对比度 / Contrast" value={contrast} min={-100} max={100} onChange={setContrast} />
                    <Slider label="抖动 / Dither" value={ditherStrength} min={0} max={2} onChange={setDitherStrength} />
                    
                    <div className={`flex flex-col gap-5 transition-opacity ${mode === 'GB' ? 'opacity-20 pointer-events-none' : 'opacity-100'}`}>
                      <Slider label="色相 / Hue" value={hue} min={0} max={360} onChange={setHue} suffix="°" />
                      <Slider label="饱和度 / Saturation" value={saturation} min={0} max={2} onChange={setSaturation} />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-2 mt-6 transition-opacity duration-500" style={{opacity: mode==='GBC' ? 0.2 : 1}}>
                    {PALETTES.map((p, i) => (
                      <button key={i} onClick={()=>setPaletteIdx(i)} className={`flex flex-col gap-2 p-3 rounded-[12px] bg-black/30 transition-all ${paletteIdx===i?'bg-zinc-800 text-green-400':'text-zinc-600 hover:bg-zinc-800/40'}`}>
                        <span className="text-[9px] font-black uppercase truncate text-left tracking-widest">{p.name.split(' (')[0]}</span>
                        <div className="flex h-1 w-full rounded-full overflow-hidden bg-zinc-950 shadow-inner">
                          {p.colors.map(c => <div key={c} style={{backgroundColor:c}} className="flex-1" />)}
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              </aside>

              {/* 中间预览区 */}
              <main className={`flex-1 ${containerClass} bg-transparent flex flex-col relative`}>
                <div className="h-12 flex items-center px-6 shrink-0 z-20">
                    <div className="flex items-center gap-3">
                      <div className={`w-1.5 h-1.5 rounded-full ${!mediaObj?'bg-zinc-900':isRecording?'bg-red-500 animate-fast-blink':'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)] animate-pulse'}`} />
                      <span className="text-[11px] text-zinc-500 font-black uppercase tracking-[0.2em] leading-none mt-0.5">显示输出 / Live Output</span>
                    </div>
                </div>
                <div className="flex-1 flex flex-col items-center justify-center p-8 overflow-hidden" onDoubleClick={()=>!mediaObj&&fileInputRef.current?.click()}>
                  {!mediaObj ? (
                    <div className="text-zinc-400 font-black uppercase tracking-widest text-center cursor-pointer group hover:text-zinc-200 transition-colors" onClick={()=>fileInputRef.current?.click()}>
                      <p className="text-3xl tracking-tighter opacity-20 group-hover:opacity-40 transition-opacity">Empty</p>
                      <span className="text-[10px] text-zinc-600 mt-4 block uppercase font-bold tracking-[0.2em] leading-none">点击或双击上传媒体文件</span>
                    </div>
                  ) : (
                    <div className="w-full h-full flex items-center justify-center">
                      <canvas ref={canvasRef} className="rounded-[12px] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.8)] max-w-full max-h-full object-contain transition-all duration-300" />
                    </div>
                  )}
                </div>
                {/* 底部状态条：移除黑色背景 */}
                <footer className="h-14 flex items-center justify-between px-8 bg-transparent opacity-90 shrink-0">
                    <div className="flex flex-col text-left">
                        <span className="text-[9px] font-black uppercase text-zinc-600 tracking-widest">系统状态 / Status</span>
                        <span className="text-[11px] font-black tracking-wider text-zinc-400 leading-none mt-1 uppercase">Signal: Nominal</span>
                    </div>
                    <div className="text-right flex flex-col">
                        <span className="text-[9px] font-black uppercase text-zinc-600 tracking-widest">媒体信息 / Info</span>
                        <span className="text-[11px] font-mono font-black text-zinc-400 leading-none mt-1 uppercase">
                          {mediaObj ? `${mediaType==='video'?'Video':'Image'} / ${canvasRef.current?.width}x${canvasRef.current?.height}` : 'No Media'}
                        </span>
                    </div>
                </footer>
              </main>
            </div>

            <footer className="py-2 text-center opacity-30 hover:opacity-100 transition-opacity shrink-0">
               <p className="text-[9px] text-zinc-500 font-bold tracking-widest uppercase text-center leading-none">
                 感谢 olivvybee，愿天下开源作者一生平安快乐。原作者主页：<a href="https://ko-fi.com/olivvybee" target="_blank" className="underline hover:text-green-400">https://ko-fi.com/olivvybee</a>
               </p>
            </footer>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
