<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GB Gen 图像实验室</title>
  
  <!-- 基础 Favicon -->
  <link rel="icon" href="others/icon.png?v=1" type="image/png">
  
  <!-- 苹果设备专用：彻底消除 PWA 桌面图标白边 -->
  <!-- 使用 precomposed 声明，强制系统 1:1 物理拉伸，禁止系统自动填充白底 -->
  <link rel="apple-touch-icon-precomposed" href="others/icon.png?v=1">
  <link rel="apple-touch-icon" sizes="180x180" href="others/icon.png?v=1">
  
  <!-- 颜色配置同步 -->
  <meta name="theme-color" content="#0c0c0c">
  
  <!-- 苹果 WebApp 强制标准适配 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GB Gen">
  <meta name="mobile-web-app-capable" content="yes">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body { 
      background-color: #0c0c0c; 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow: hidden; 
      -webkit-touch-callout: none;
      user-select: none;
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #444; }
    
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      max-width: 100%;
      object-fit: contain;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 9999px;
      flex-shrink: 0;
    }

    a { text-decoration: none; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.99); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-pop-in {
      animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 完全扁平化自定义滑块 */
    .custom-slider {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 9999px;
      outline: none;
      border: none;
      margin: 0; 
    }

    .custom-slider::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: transparent;
      border: none;
      border-radius: 9999px;
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px; 
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
      box-shadow: none;
      margin-top: -3px; 
    }

    .custom-slider::-moz-range-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: transparent;
      border: none;
      border-radius: 9999px;
    }

    .custom-slider::-moz-range-thumb {
      width: 10px; 
      height: 10px;
      border-radius: 50%;
      background: #4ade80;
      cursor: pointer;
      border: none;
      box-shadow: none;
    }

    @keyframes fastBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 15px rgba(239, 68, 68, 1); }
      50% { opacity: 0.3; box-shadow: 0 0 2px rgba(239, 68, 68, 0.5); }
    }
    .animate-fast-blink {
      animation: fastBlink 0.3s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const injectManifest = () => {
      const manifest = {
        name: "GB Gen 图像实验室",
        short_name: "GB Gen",
        start_url: "./", 
        display: "standalone", 
        background_color: "#0c0c0c", // 强制启动页背景与应用统一，消除缝隙
        theme_color: "#0c0c0c",
        icons: [
          { 
            src: "others/icon.png?v=1", 
            sizes: "180x180", 
            type: "image/png",
            purpose: "any" // 设定为“不可遮罩”，阻止系统为了适配圆角而内缩图标
          },
          { 
            src: "others/icon.png?v=1", 
            sizes: "192x192", 
            type: "image/png",
            purpose: "any" 
          },
          { 
            src: "others/icon.png?v=1", 
            sizes: "512x512", 
            type: "image/png",
            purpose: "any" 
          }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    };

    const registerServiceWorker = () => {
      if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });`;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
      }
    };

    const IconUpload = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
    );
    const IconDownload = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    );
    const IconCoffee = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="13" y1="1" x2="13" y2="4"/>
      </svg>
    );
    const IconClose = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    );
    const IconDice = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/>
      </svg>
    );
    const IconUndo = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );
    const IconFlask = ({ size = 24 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M10 2v7.527a2 2 0 0 1-.211.896L4.72 20.55a2 2 0 0 0 1.8 2.95h10.96a2 2 0 0 0 1.8-2.95L14.2 10.42a2 2 0 0 1-.2-1.316V2"/>
        <path d="M8.5 2h7"/><path d="M7 16h10"/>
      </svg>
    );

    const PALETTES = [
      { id: 'pocket', name: '口袋灰 (Pocket Gray)', colors: ['#2b2b26', '#706b66', '#a89f94', '#e0d7c8'] },
      { id: 'classic', name: '经典绿 (Classic DMG)', colors: ['#0f380f', '#306230', '#8bac0f', '#9bbc0f'] },
      { id: 'blue', name: '冷光蓝 (Light Blue)', colors: ['#002b59', '#005f8c', '#0098ba', '#cae6ea'] },
      { id: 'vb', name: '虚拟男孩 (Virtual Boy)', colors: ['#000000', '#550000', '#aa0000', '#ff0000'] },
      { id: 'gold', name: '复古金 (Warm Gold)', colors: ['#2c1b01', '#7a4d13', '#c1913c', '#f3d87a'] },
      { id: 'cyber', name: '赛博朋克 (Cyberpunk)', colors: ['#12012e', '#005f8c', '#d9116e', '#00ffcc'] }
    ];

    const JUNE_TIPS = [
      "尽可能导入对比度比较高的照片",
      "像素颗粒和对比度是比较重要的参数",
      "个人比较喜欢口袋灰和经典绿",
      "骰子模式你玩了吗？打开之后有点版画的质感",
      "骰子模式的基础上调像素粒径？可以啊",
      "你可以导入不同比例的图片，导出不会被裁剪",
      "谢有君还有游戏和音乐项目，欢迎关注了解"
    ];

    const BAYER_8X8 = [
      [ 0, 32,  8, 40,  2, 34, 10, 42], [48, 16, 56, 24, 50, 18, 58, 26],
      [12, 44,  4, 36, 14, 46,  6, 38], [60, 28, 52, 20, 62, 30, 54, 22],
      [ 3, 35, 11, 43,  1, 33,  9, 41], [51, 19, 59, 27, 49, 17, 57, 25],
      [15, 47,  7, 39, 13, 45,  5, 37], [63, 31, 55, 23, 61, 29, 53, 21]
    ];

    const hexToRgb = (hex) => {
      const bigint = parseInt(hex.replace('#', ''), 16);
      return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
    };

    function App() {
      const [imageObj, setImageObj] = useState(null);
      const [pixelSize, setPixelSize] = useState(6); 
      const [paletteIdx, setPaletteIdx] = useState(0); 
      const [brightness, setBrightness] = useState(-21);
      const [contrast, setContrast] = useState(-16);
      const [ditherStrength, setDitherStrength] = useState(0.1);
      const [mode, setMode] = useState('GB'); 
      const [userDisplayName, setUserDisplayName] = useState("@谢有君");
      const [showDonationModal, setShowDonationModal] = useState(false);
      
      const [prevSettings, setPrevSettings] = useState(null);
      const [isRandomized, setIsRandomized] = useState(false);
      const [isLabMode, setIsLabMode] = useState(false);
      const [currentTipIdx, setCurrentTipIdx] = useState(0);
      const [isRecording, setIsRecording] = useState(false);

      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);
      
      const processedCanvasRef = useRef(null);
      const animationRef = useRef(null);
      
      const imageObjRef = useRef(imageObj);
      const pixelSizeRef = useRef(pixelSize);
      const paletteIdxRef = useRef(paletteIdx);
      const brightnessRef = useRef(brightness);
      const contrastRef = useRef(contrast);              
      const dynamicContrastRef = useRef(contrast);       
      const ditherStrengthRef = useRef(ditherStrength);
      const modeRef = useRef(mode);
      const isLabModeRef = useRef(isLabMode);
      
      const isDraggingRef = useRef(false);

      useEffect(() => { imageObjRef.current = imageObj; }, [imageObj]);
      useEffect(() => { pixelSizeRef.current = pixelSize; }, [pixelSize]);
      useEffect(() => { paletteIdxRef.current = paletteIdx; }, [paletteIdx]);
      useEffect(() => { brightnessRef.current = brightness; }, [brightness]);
      useEffect(() => { ditherStrengthRef.current = ditherStrength; }, [ditherStrength]);
      useEffect(() => { modeRef.current = mode; }, [mode]);
      useEffect(() => { isLabModeRef.current = isLabMode; }, [isLabMode]);
      
      useEffect(() => { 
          contrastRef.current = contrast; 
          if (!isLabModeRef.current) {
              dynamicContrastRef.current = contrast;
          }
      }, [contrast]);

      useEffect(() => {
        injectManifest();
        registerServiceWorker();
        const tipTimer = setInterval(() => {
          setCurrentTipIdx(prev => (prev + 1) % JUNE_TIPS.length);
        }, 20000);
        return () => clearInterval(tipTimer);
      }, []);

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => { setImageObj(img); };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleRandomize = () => {
        setPrevSettings({ pixelSize, paletteIdx, brightness, contrast, ditherStrength });
        setPixelSize(1);
        setDitherStrength(0);
        setPaletteIdx(Math.floor(Math.random() * PALETTES.length));
        setIsRandomized(true);
      };

      const handleUndo = () => {
        if (prevSettings) {
          setPixelSize(prevSettings.pixelSize);
          setPaletteIdx(prevSettings.paletteIdx);
          setBrightness(prevSettings.brightness);
          setContrast(prevSettings.contrast);
          setDitherStrength(prevSettings.ditherStrength);
          setIsRandomized(false);
        }
      };

      const processImage = () => {
        const img = imageObjRef.current;
        const canvas = canvasRef.current;
        if (!canvas || !img) return false;

        if (!processedCanvasRef.current) {
          processedCanvasRef.current = document.createElement('canvas');
        }
        const pCanvas = processedCanvasRef.current;

        const width = img.width;
        const height = img.height;
        canvas.width = width; canvas.height = height;
        pCanvas.width = width; pCanvas.height = height;
        
        const pSize = pixelSizeRef.current;
        const activeContrast = dynamicContrastRef.current; 
        const bBright = brightnessRef.current;
        const dStr = ditherStrengthRef.current;
        const pIdx = paletteIdxRef.current;
        const curMode = modeRef.current;

        const logicalWidth = Math.max(1, Math.floor(width / pSize));
        const logicalHeight = Math.max(1, Math.floor(height / pSize));
        
        const offscreen = document.createElement('canvas');
        offscreen.width = logicalWidth; offscreen.height = logicalHeight;
        const offCtx = offscreen.getContext('2d');
        offCtx.drawImage(img, 0, 0, logicalWidth, logicalHeight);
        
        const imgData = offCtx.getImageData(0, 0, logicalWidth, logicalHeight);
        const data = imgData.data;
        const factor = (259 * (activeContrast + 255)) / (255 * (259 - activeContrast));
        
        for (let i = 0; i < data.length; i += 4) {
          let r = data[i], g = data[i+1], b = data[i+2];
          r = factor * (r - 128) + 128 + bBright;
          g = factor * (g - 128) + 128 + bBright;
          b = factor * (b - 128) + 128 + bBright;
          r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
          
          const x = (i / 4) % logicalWidth; const y = Math.floor((i / 4) / logicalWidth);
          const noise = ((BAYER_8X8[y % 8][x % 8] / 64) - 0.5) * 255 * dStr;
          
          if (curMode === 'GB') {
            let luma = 0.299 * r + 0.587 * g + 0.114 * b + noise;
            let idx = Math.max(0, Math.min(3, Math.floor((luma / 255) * 3 + 0.5)));
            const paletteColors = PALETTES[pIdx].colors.map(hexToRgb);
            data[i] = paletteColors[idx].r; data[i+1] = paletteColors[idx].g; data[i+2] = paletteColors[idx].b;
          } else {
            r += noise; g += noise; b += noise;
            data[i] = Math.max(0, Math.min(255, Math.floor(r / 8) * 8));
            data[i+1] = Math.max(0, Math.min(255, Math.floor(g / 8) * 8));
            data[i+2] = Math.max(0, Math.min(255, Math.floor(b / 8) * 8));
          }
        }
        offCtx.putImageData(imgData, 0, 0);
        
        const pCtx = pCanvas.getContext('2d', { willReadFrequently: true });
        pCtx.imageSmoothingEnabled = false;
        pCtx.clearRect(0, 0, width, height);
        pCtx.drawImage(offscreen, 0, 0, logicalWidth, logicalHeight, 0, 0, width, height);

        if (!isLabModeRef.current) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, width, height);
            ctx.drawImage(pCanvas, 0, 0);
        }
        return true;
      };

      const glitchLoop = () => {
          if (!isLabModeRef.current) return;
          const canvas = canvasRef.current;
          if (!canvas || !imageObjRef.current) return;

          const baseC = contrastRef.current;
          let needsUpdate = false;
          
          if (Math.random() < 0.25) { 
              dynamicContrastRef.current = baseC + (Math.random() * 20);
              needsUpdate = true;
          } else if (Math.random() < 0.1) {
              dynamicContrastRef.current = baseC;
              needsUpdate = true;
          }

          if (needsUpdate) {
              processImage(); 
              if (!isDraggingRef.current) {
                  const slider = document.getElementById('slider-contrast');
                  const display = document.getElementById('display-contrast');
                  if (slider) {
                      slider.value = dynamicContrastRef.current;
                      const pct = ((dynamicContrastRef.current - (-100)) / 200) * 100;
                      slider.style.background = `linear-gradient(to right, #4ade80 ${pct}%, #3f3f46 ${pct}%)`;
                  }
                  if (display) display.innerText = Math.floor(dynamicContrastRef.current);
              }
          }

          const pCanvas = processedCanvasRef.current;
          if (!pCanvas) return;

          const ctx = canvas.getContext('2d');
          const w = canvas.width;
          const h = canvas.height;
          const currentPixelSize = pixelSizeRef.current;

          ctx.drawImage(pCanvas, 0, 0);

          if (Math.random() < 0.3) {
              let drawYOffset = 0;
              if (Math.random() < 0.2) { 
                 drawYOffset = Math.floor((Math.random() - 0.5) * 10) * currentPixelSize;
                 ctx.fillStyle = '#000';
                 ctx.fillRect(0, 0, w, h);
                 ctx.drawImage(pCanvas, 0, drawYOffset);
              }
              if (Math.random() < 0.5) { 
                 const numSlices = Math.floor(Math.random() * 4) + 1;
                 for(let i = 0; i < numSlices; i++) {
                     const sliceY = Math.floor((Math.random() * h) / currentPixelSize) * currentPixelSize;
                     const sliceH = Math.floor((Math.random() * (h * 0.1)) / currentPixelSize) * currentPixelSize + currentPixelSize;
                     const shiftX = Math.floor((Math.random() - 0.5) * 15) * currentPixelSize; 
                     ctx.drawImage(pCanvas, 0, sliceY, w, sliceH, shiftX, sliceY + drawYOffset, w, sliceH);
                 }
              }
              if (Math.random() < 0.2) { 
                  ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                  ctx.fillRect(0, 0, w, h);
              }
          }
          
          animationRef.current = requestAnimationFrame(glitchLoop);
      };

      useEffect(() => { 
        if (!isLabMode) {
           dynamicContrastRef.current = contrast;
        }
        processImage(); 
      }, [imageObj, pixelSize, paletteIdx, brightness, contrast, ditherStrength, mode]);

      useEffect(() => {
        if (isLabMode && imageObj) {
           if (animationRef.current) cancelAnimationFrame(animationRef.current);
           glitchLoop();
        } else {
           if (animationRef.current) cancelAnimationFrame(animationRef.current);
           dynamicContrastRef.current = contrastRef.current;
           processImage();
           
           const slider = document.getElementById('slider-contrast');
           const display = document.getElementById('display-contrast');
           if (slider) {
               slider.value = contrastRef.current;
               const pct = ((contrastRef.current - (-100)) / 200) * 100;
               slider.style.background = `linear-gradient(to right, #4ade80 ${pct}%, #3f3f46 ${pct}%)`;
           }
           if (display) display.innerText = Math.floor(contrastRef.current);
        }
        return () => {
           if (animationRef.current) cancelAnimationFrame(animationRef.current);
        };
      }, [isLabMode, imageObj]);

      const download = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        if (isLabMode) {
          if (isRecording) return; 
          setIsRecording(true);
          const stream = canvas.captureStream(30);
          let mimeType = '';
          if (MediaRecorder.isTypeSupported('video/mp4')) {
            mimeType = 'video/mp4';
          } else if (MediaRecorder.isTypeSupported('video/webm; codecs=vp9')) {
            mimeType = 'video/webm; codecs=vp9';
          } else if (MediaRecorder.isTypeSupported('video/webm')) {
            mimeType = 'video/webm';
          }
          const options = mimeType ? { mimeType } : {};
          const recorder = new MediaRecorder(stream, options);
          const chunks = [];
          recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
          recorder.onstop = () => {
            const actualMime = mimeType || 'video/mp4';
            const extension = actualMime.includes('mp4') ? 'mp4' : 'webm';
            const blob = new Blob(chunks, { type: actualMime });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = `gb_gen_lab_mode_${Date.now()}.${extension}`;
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
            setIsRecording(false);
          };
          recorder.start();
          setTimeout(() => { if (recorder.state === "recording") recorder.stop(); }, 5000);
        } else {
          const link = document.createElement('a');
          link.download = `gb_gen_${mode}_${Date.now()}.png`;
          link.href = canvas.toDataURL();
          link.click();
        }
      };

      const cardClass = "bg-zinc-900/40 rounded-2xl p-5 flex flex-col";
      const containerClass = "w-full bg-zinc-800/40 rounded-[28px] overflow-hidden";

      return (
        <div 
          className="h-[100dvh] flex flex-col items-center justify-center p-4 text-zinc-200"
          style={{
            paddingTop: 'max(1rem, env(safe-area-inset-top))',
            paddingBottom: 'max(0.5rem, env(safe-area-inset-bottom))',
            paddingLeft: 'max(1rem, env(safe-area-inset-left))',
            paddingRight: 'max(1rem, env(safe-area-inset-right))'
          }}
        >
          <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />

          {showDonationModal && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md" onClick={() => setShowDonationModal(false)}>
              <div className="bg-zinc-900 rounded-[32px] p-10 max-w-2xl w-full relative flex flex-col items-center animate-pop-in" onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowDonationModal(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-zinc-200 p-2 hover:bg-zinc-800 rounded-full transition-all"><IconClose size={24} /></button>
                <h2 className="text-2xl font-bold text-zinc-100 mb-2 mt-4">请我喝杯咖啡 ☕️</h2>
                <p className="text-sm text-zinc-500 mb-10">如果这个工具对你有帮助，欢迎打赏支持独立开发</p>
                <div className="flex gap-8 w-full justify-center">
                  <div className="flex flex-col items-center bg-zinc-950 p-5 rounded-3xl w-[240px]">
                    <div className="w-full aspect-square bg-white rounded-2xl overflow-hidden mb-4"><img src="others/wechatpay.jpg" alt="微信支付" className="w-full h-full object-cover" /></div>
                    <span className="text-sm font-bold text-[#07c160] tracking-widest">微信支付</span>
                  </div>
                  <div className="flex flex-col items-center bg-zinc-950 p-5 rounded-3xl w-[240px]">
                    <div className="w-full aspect-square bg-white rounded-2xl overflow-hidden mb-4"><img src="others/alipay.jpg" alt="支付宝" className="w-full h-full object-cover" /></div>
                    <span className="text-sm font-bold text-[#1677ff] tracking-widest">支付宝</span>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="w-[75vw] max-w-5xl flex flex-col gap-5 animate-pop-in">
            <div className={`${containerClass} p-4 flex items-center justify-between gap-6 flex-shrink-0`}>
              <div className="flex items-center gap-5 text-left">
                <img src="others/xieyoujune.jpg" alt="Avatar" className="user-avatar" onError={(e) => e.target.style.display='none'} />
                <div className="flex flex-col text-left">
                  <span className="text-xl font-black text-zinc-100 leading-none tracking-tight transition-all duration-200">{userDisplayName}</span>
                  <div className="flex items-center gap-2 mt-1.5 text-[10px] font-bold uppercase tracking-widest">
                    <a href="https://music.163.com/#/artist?id=1184020" target="_blank" rel="noopener noreferrer" className="text-zinc-500 hover:text-green-400 transition-colors" onMouseEnter={() => setUserDisplayName("看看我的音乐项目")} onMouseLeave={() => setUserDisplayName("@谢有君")}>独立音乐人</a>
                    <span className="text-zinc-800">/</span>
                    <a href="https://www.xiaohongshu.com/user/profile/63cac1130000000026006f9a" target="_blank" rel="noopener noreferrer" className="text-zinc-500 hover:text-green-400 transition-colors" onMouseEnter={() => setUserDisplayName("看看我的游戏项目")} onMouseLeave={() => setUserDisplayName("@谢有君")}>《人生之旅》游戏开发者</a>
                  </div>
                </div>
                <div className="h-10 w-[1px] bg-white/10 mx-2"></div>
                <div className="flex flex-col text-left">
                  <h1 className="text-xl font-black text-green-400 leading-none tracking-tight">GB Gen 图像实验室</h1>
                  <p className="text-[10px] font-bold text-zinc-600 mt-1.5 uppercase tracking-widest">Pixel Art Generation Lab</p>
                </div>
              </div>
              <div className="flex gap-2">
                <button onClick={() => fileInputRef.current?.click()} className="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 rounded-xl flex items-center gap-2 transition-all text-sm font-black uppercase tracking-widest"><IconUpload size={16} />上传</button>
                <button onClick={download} disabled={!imageObj || isRecording} className="px-5 py-2.5 bg-green-500 hover:bg-green-400 text-zinc-950 rounded-xl flex items-center gap-2 transition-all disabled:opacity-20 text-sm font-black uppercase tracking-widest min-w-[110px] justify-center">
                  {isRecording ? (
                    <span className="flex items-center gap-2 animate-pulse"><div className="w-2 h-2 bg-red-500 rounded-full"></div> 录制中</span>
                  ) : (
                    <><IconDownload size={16} />导出</>
                  )}
                </button>
                <button onClick={() => setShowDonationModal(true)} className="px-4 py-2.5 bg-zinc-800 hover:bg-zinc-700 text-zinc-100 rounded-xl flex items-center transition-all"><IconCoffee size={18} /></button>
              </div>
            </div>

            <div className="flex gap-5 items-stretch justify-center h-full min-h-[480px] lg:max-h-[540px] xl:max-h-[580px]">
              {imageObj && (
                <div className={`w-[320px] xl:w-[350px] flex-shrink-0 ${containerClass} p-4 flex flex-col justify-between overflow-hidden animate-pop-in`}>
                  <div className={`${cardClass} p-4`}>
                    <div className="flex gap-2.5 items-center">
                      <div className="flex-1 flex p-1 bg-black/30 rounded-xl items-stretch">
                          <button onClick={() => setMode('GB')} className={`flex-1 py-2 text-[11px] font-black uppercase tracking-widest rounded-lg transition-all ${mode === 'GB' ? 'bg-zinc-700 text-green-400 shadow-xl' : 'text-zinc-600 hover:text-zinc-300'}`}>GB</button>
                          <button onClick={() => setMode('GBC')} className={`flex-1 py-2 text-[11px] font-black uppercase tracking-widest rounded-lg transition-all ${mode === 'GBC' ? 'bg-zinc-700 text-green-400 shadow-xl' : 'text-zinc-600 hover:text-zinc-300'}`}>GBC</button>
                          <div className="w-[1px] bg-white/5 mx-1 my-1"></div>
                          <button 
                            onClick={() => setIsLabMode(!isLabMode)} 
                            className={`px-3 flex items-center justify-center rounded-lg transition-all ${isLabMode ? 'bg-green-500/20 text-green-400 shadow-xl' : 'text-zinc-600 hover:text-zinc-300'}`}
                            title="Lab Mode (Glitch Effect)"
                          >
                            <IconFlask size={16} />
                          </button>
                      </div>
                      <button onClick={isRandomized ? handleUndo : handleRandomize} className="p-2.5 bg-black/30 hover:bg-zinc-800 rounded-xl transition-all text-zinc-500 hover:text-green-400">
                        {isRandomized ? <IconUndo size={18} /> : <IconDice size={18} />}
                      </button>
                    </div>
                  </div>

                  <div className={`${cardClass} p-4`}>
                    <div className="flex flex-col gap-4 text-left">
                      <div className="flex flex-col gap-2">
                        <div className="flex justify-between text-[11px] font-black text-green-400 uppercase tracking-widest"><span>像素粒径 / Pixel Size</span><span>{pixelSize}PX</span></div>
                        <input 
                          type="range" min="1" max="40" 
                          value={pixelSize} 
                          onChange={e => setPixelSize(Number(e.target.value))} 
                          className="custom-slider w-full mt-1 mb-1" 
                          style={{ background: `linear-gradient(to right, #4ade80 ${((pixelSize - 1) / 39) * 100}%, #3f3f46 ${((pixelSize - 1) / 39) * 100}%)` }}
                        />
                      </div>
                      <div className="flex flex-col gap-3 mt-1">
                        {[
                          { id: 'slider-brightness', displayId: 'display-brightness', label: '亮度 / Brightness', val: brightness, set: setBrightness, min: -100, max: 100 },
                          { id: 'slider-contrast', displayId: 'display-contrast', label: '对比度 / Contrast', val: contrast, set: setContrast, min: -100, max: 100 },
                          { id: 'slider-dither', displayId: 'display-dither', label: '抖动 / Dither', val: ditherStrength, set: setDitherStrength, min: 0, max: 2, step: 0.1 }
                        ].map(item => (
                          <div key={item.label} className="flex flex-col gap-1.5 text-left">
                            <div className="flex justify-between text-[10px] font-black text-zinc-500 uppercase tracking-widest text-left">
                              <span>{item.label}</span>
                              <span id={item.displayId}>{item.val}</span>
                            </div>
                            <input 
                                id={item.id}
                                type="range" 
                                min={item.min} 
                                max={item.max} 
                                step={item.step || 1} 
                                value={item.val} 
                                onChange={e => item.set(Number(e.target.value))} 
                                onMouseDown={() => { if (item.id === 'slider-contrast') isDraggingRef.current = true; }}
                                onMouseUp={() => { if (item.id === 'slider-contrast') isDraggingRef.current = false; }}
                                onTouchStart={() => { if (item.id === 'slider-contrast') isDraggingRef.current = true; }}
                                onTouchEnd={() => { if (item.id === 'slider-contrast') isDraggingRef.current = false; }}
                                className="custom-slider w-full mt-1" 
                                style={{ background: `linear-gradient(to right, #4ade80 ${((item.val - item.min) / (item.max - item.min)) * 100}%, #3f3f46 ${((item.val - item.min) / (item.max - item.min)) * 100}%)` }}
                            />
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  <div className={`${cardClass} p-4 transition-opacity duration-500 ${mode === 'GBC' ? 'opacity-20 pointer-events-none grayscale' : 'opacity-100'}`}>
                    <div className="text-[11px] font-black text-zinc-400 uppercase tracking-widest mb-3 text-left">调色板 / Palettes</div>
                    <div className="grid grid-cols-2 gap-2 text-left">
                      {PALETTES.map((p, i) => (
                        <button key={i} onClick={() => setPaletteIdx(i)} className={`group flex flex-col gap-2 px-3 py-2 rounded-xl transition-all ${paletteIdx === i ? 'bg-zinc-800 text-green-400' : 'bg-black/30 hover:bg-zinc-800 text-zinc-500'}`}>
                          <span className="text-[9px] font-black uppercase tracking-tighter truncate text-left">{p.name.split(' (')[0]}</span>
                          <div className="flex h-1 w-full rounded-full overflow-hidden shadow-inner">
                            {p.colors.map(c => <div key={c} style={{backgroundColor: c}} className="flex-1" />)}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className={`${cardClass} p-4`}>
                    <div className="text-[11px] font-black text-zinc-400 uppercase tracking-widest mb-1 text-left">有君建议 / June's Tips</div>
                    <div className="h-[20px] relative overflow-hidden text-left">
                      {JUNE_TIPS.map((tip, index) => (
                        <div key={index} className={`absolute left-0 right-0 top-0 text-[10px] font-bold text-zinc-600 leading-tight transition-all duration-1000 ${currentTipIdx === index ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-1 pointer-events-none'}`}>
                          {tip}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              <div 
                className={`flex-1 ${containerClass} bg-[#000000] flex flex-col items-center justify-center relative p-8`} 
                onDoubleClick={() => !imageObj && fileInputRef.current?.click()}
              >
                <div className="absolute top-6 left-6 flex items-center gap-3 z-10 text-left">
                    <div className={`w-2.5 h-2.5 rounded-full ${
                      !imageObj ? 'bg-zinc-900' : 
                      isRecording ? 'bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.9)] animate-fast-blink' : 
                      (isLabMode ? 'bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)] animate-pulse' : 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.6)] animate-pulse')
                    }`}></div>
                    <div className="text-[11px] text-zinc-600 font-black uppercase tracking-[0.2em] leading-none text-left">
                      {isRecording ? 'RECORDING VIDEO...' : '显示输出 / Live Output'}
                    </div>
                </div>
                
                {!imageObj ? (
                  <div className="w-full h-full flex flex-col items-center justify-center cursor-pointer group">
                    <div className="relative inline-block transition-transform group-hover:scale-105 duration-500">
                      <p className="text-[22px] font-bold text-zinc-400 tracking-wide leading-none mb-[14px]">
                        请提供一张图像
                      </p>
                      <div className="flex justify-between text-[13px] font-medium text-zinc-600 leading-none">
                        {"点击上方按钮或双击上传".split('').map((char, i) => (
                          <span key={i}>{char}</span>
                        ))}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="w-full h-full flex flex-col items-center justify-center animate-pop-in">
                    <div className="flex-1 flex items-center justify-center w-full min-h-0 mt-6">
                      <canvas ref={canvasRef} className="max-w-full max-h-full rounded-sm shadow-[0_30px_80px_rgba(0,0,0,0.9)]" />
                    </div>
                    <div className="mt-8 mb-2 flex flex-col items-center gap-2 text-center flex-shrink-0">
                        <p className="text-[12px] text-zinc-400 font-black uppercase tracking-[0.2em]">
                          {isLabMode ? 'Lab Mode (Dynamic Signal)' : (isRandomized ? 'Dice Mode (Experimental)' : (mode === 'GB' ? 'Original Game Boy Mode (DMG-01)' : 'Game Boy Color Mode (CGB-001)'))}
                        </p>
                        <p className="text-[9px] text-zinc-700 font-bold uppercase tracking-[0.3em]">
                          {imageObj.width} X {imageObj.height} {isLabMode ? 'GLITCH FX RENDER' : (isRandomized ? 'STOCHASTIC RENDER' : 'DOT MATRIX DISPLAY')}
                        </p>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <footer className="py-2 text-center opacity-30 hover:opacity-100 transition-opacity">
               <p className="text-[9px] text-zinc-500 font-bold tracking-widest uppercase">
                 感谢 olivvybee，愿天下开源作者一生平安快乐。原作者主页：<a href="https://ko-fi.com/olivvybee" target="_blank" className="underline hover:text-green-400">https://ko-fi.com/olivvybee</a>
               </p>
            </footer>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
